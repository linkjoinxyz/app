name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'linkjoin-backend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./linkjoin-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/linkjoin-backend:latest
