name: Deploy Backend

"on":
  push:
    branches: [main]
    paths:
      - 'linkjoin-backend/**'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug checkout
        run: ls -la linkjoin-backend/

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/linkjoin-backend:latest ./linkjoin-backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/linkjoin-backend:latest
